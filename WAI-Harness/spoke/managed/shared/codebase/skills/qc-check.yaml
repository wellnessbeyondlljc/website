name: qc-check
role: reviewer
model: lightweight
description: "Quality control verification - runs tests, checks startup, validates coverage before shipment"

trigger:
  events:
    - pre_commit
    - pre_shipit
    - on_demand
  conditions:
    - "code changes detected OR"
    - "shipit command invoked OR"
    - "explicit /qc-check command"

scope:
  reads:
    - "test files (tests/**)"
    - "source code (src/**, *.py)"
    - "configuration files (pytest.ini, .coveragerc)"
  writes:
    - "test output to session log"
    - "coverage reports (if configured)"

prerequisites:
  - "test framework available (pytest, jest, etc.)"
  - "spoke-level qc-check override (optional)"

behavior:
  on_trigger: |
    1. Load spoke-level qc-check.yaml if exists (overrides)
    2. Run configured quality gates in order:
       a. Unit tests (pytest, npm test, etc.)
       b. Integration tests (if configured)
       c. Startup validation (can the app launch?)
       d. Coverage check (if threshold configured)
    3. Run pre-commit warnings (Phase 5):
       a. Scan for secrets (.env, *.key, credentials.*, *secret*, *password*)
       b. Check file sizes (warn > 1MB, block > 10MB)
       c. Detect debug statements (console.log, print(), debugger, breakpoint())
       d. Find TODOs added (TODO, FIXME, XXX, HACK in staged files)
    4. Collect results for each gate + warnings
    5. Determine pass/fail/warn based on thresholds

  pre_commit_warnings: |
    New in Phase 5 - scan staged files for common issues:

    CRITICAL (block commit):
    - Secrets detected: .env, *.key, *.pem, credentials.*, config/*secret*, *password*
    - Large files: > 10MB (suggest git-lfs or external storage)
    - Syntax errors: File won't parse/compile

    WARNINGS (show but don't block):
    - Large files: 1MB - 10MB (warn about repo bloat)
    - Debug statements: console.log(), print(), debugger, breakpoint()
    - TODOs added: TODO, FIXME, XXX, HACK (signals incomplete work)
    - Binary files: *.exe, *.dll, *.so (usually shouldn't be committed)

    Check patterns (regex):
    - Secrets: (password|secret|key|token|credential).*=.*["'](.+)["']
    - Debug: console\\.log|print\\(|debugger|breakpoint\\(
    - TODO: (TODO|FIXME|XXX|HACK):

  on_failure: |
    - If tests fail: BLOCK commit/shipit, show failures
    - If startup fails: BLOCK commit/shipit, show error
    - If secrets detected: BLOCK commit/shipit, list files (Phase 5)
    - If large files (>10MB): BLOCK commit/shipit, suggest alternatives (Phase 5)
    - If coverage below threshold: WARN (soft failure)
    - If debug statements found: WARN, suggest cleanup (Phase 5)
    - If TODOs added: WARN, note incomplete work (Phase 5)
    - Log all failures/warnings to session observations

  override_behavior: |
    Spoke-level {spoke}/skills/qc-check.yaml can define:
    - custom_commands: ["make test", "npm run lint"]
    - coverage_threshold: 80
    - startup_command: "python -m myapp --version"
    - skip_tests: false (emergency override)

output:
  success:
    type: "qc_passed"
    data:
      gates_run: ["tests", "startup", "coverage"]
      results: {tests: "48 passed", startup: "ok", coverage: "87%"}
  failure:
    type: "qc_failed"
    data:
      failed_gate: "tests"
      details: "3 tests failed in test_auth.py"
      action: "BLOCKED - fix failures before commit"

use_cases:
  - scenario: "Developer runs /shipit to commit and push changes"
    what_happens: "qc-check runs pytest, validates startup, checks coverage"
    why_it_matters: "Broken code never reaches main branch"
    user_trigger: "/shipit command"

  - scenario: "Tests pass but app won't start (import error)"
    what_happens: "qc-check detects startup failure, blocks shipit"
    why_it_matters: "Tests passing doesn't guarantee the app works"
    origin: "CLI rebuild phase - menu system broke despite passing tests"

  - scenario: "Coverage drops below 80% threshold"
    what_happens: "qc-check warns but doesn't block (soft failure)"
    why_it_matters: "Coverage drop signals missing tests, but shouldn't block urgent fixes"
    user_trigger: "pre_commit event with coverage configured"

  - scenario: "Spoke has custom linting requirements (WAI-Backpressure.yaml migrated)"
    what_happens: "qc-check loads spoke/skills/qc-check.yaml override, runs custom commands"
    why_it_matters: "Each spoke can define project-specific quality gates"
    reference: "Phase 3.4 - migrate WAI-Backpressure.yaml"

  - scenario: "Emergency hotfix needs to bypass tests (production down)"
    what_happens: "Spoke override sets skip_tests: true temporarily"
    why_it_matters: "Quality gates shouldn't prevent emergency fixes"
    user_trigger: "Manual spoke-level override edit"

  - scenario: "User accidentally stages .env file with API keys (Phase 5)"
    what_happens: "qc-check detects secret pattern in .env, BLOCKS commit"
    why_it_matters: "Secrets in git history = catastrophic exposure, costly remediation"
    user_trigger: "pre_commit or pre_shipit with .env staged"
    origin: "Phase 5 - pre-commit warnings added to prevent secret leaks"

  - scenario: "User stages 20MB video file (Phase 5)"
    what_happens: "qc-check detects file > 10MB, BLOCKS commit, suggests git-lfs"
    why_it_matters: "Large files bloat repo, slow clones, make history unwieldy"
    user_trigger: "pre_commit with large file staged"

  - scenario: "User left console.log() in production code (Phase 5)"
    what_happens: "qc-check detects debug statement, WARNS (doesn't block)"
    why_it_matters: "Debug statements in production = poor code hygiene, potential info leak"
    user_trigger: "pre_commit with console.log in staged files"

  - scenario: "User added TODO comments in new code (Phase 5)"
    what_happens: "qc-check detects TODO, WARNS about incomplete work"
    why_it_matters: "TODOs signal work not finished - good to know before shipit"
    user_trigger: "pre_commit with TODO in staged files"

tests:
  - name: "Blocks commit when tests fail"
    setup: "Introduce failing test"
    action: "Trigger pre_commit event"
    expected: "qc_failed returned, commit blocked"

  - name: "Allows commit when all gates pass"
    setup: "All tests pass, app starts, coverage ok"
    action: "Trigger pre_commit event"
    expected: "qc_passed returned, commit allowed"

  - name: "Respects spoke-level override commands"
    setup: "spoke/skills/qc-check.yaml with custom_commands"
    action: "Trigger qc-check"
    expected: "Custom commands executed instead of defaults"

  - name: "Detects startup failures"
    setup: "Introduce import error in main module"
    action: "Run startup validation gate"
    expected: "Startup failure detected, specific error shown"

notes: |
  Replaces WAI-Backpressure.yaml from v1. Each spoke can override default gates
  by creating spoke/skills/qc-check.yaml with project-specific commands.

  Lightweight model is sufficient - this is command execution and output parsing.

  Common overrides:
  - Python: pytest + coverage + startup (python -m module --version)
  - Node: npm test + npm run lint + startup (node index.js --help)
  - Go: go test + go vet + go build
